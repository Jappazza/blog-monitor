{% extends "admin/base_admin.html" %}
{% block title %}Accedi{% endblock %}

{% block content %}
<div class="row justify-content-center" style="height: 100vh;">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4 d-flex align-items-center">
    <div class="w-100">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock text-dark" style="font-size: 2rem;"></i>
        <h2 class="h4 fw-bold mt-2">Area Admin</h2>
      </div>
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form method="POST" action="{{ url_for('admin.admin_login') }}">
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold">Username</label>
              <input type="text" class="form-control" id="username" name="username" required autocomplete="username" />
            </div>
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" />
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-dark">Accedi</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
