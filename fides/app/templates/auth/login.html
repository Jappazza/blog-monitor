{% extends "base.html" %}

{% block title %}Accedi{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">

      <!-- Header -->
      <div class="text-center mb-4">
        <div class="mb-3">
          <i class="bi bi-journal-bookmark-fill text-dark" style="font-size: 2.5rem;"></i>
        </div>
        <h1 class="h3 fw-bold">Bentornato su Fides</h1>
        <p class="text-muted">Accedi per leggere l'ultimo digest.</p>
      </div>

      <!-- Card form -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Email</label>
              <input
                type="email"
                class="form-control form-control-lg"
                id="email"
                name="email"
                placeholder="la.tua@email.com"
                value="{{ request.form.get('email', '') }}"
                required
                autocomplete="email"
              />
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <input
                type="password"
                class="form-control form-control-lg"
                id="password"
                name="password"
                placeholder="La tua password"
                required
                autocomplete="current-password"
              />
            </div>

            <!-- Submit -->
            <div class="d-grid">
              <button type="submit" class="btn btn-dark btn-lg">
                Accedi
              </button>
            </div>

          </form>
        </div>
      </div>

      <!-- Link registrazione -->
      <p class="text-center mt-3 text-muted small">
        Non hai ancora un account?
        <a href="{{ url_for('auth.register') }}" class="text-dark fw-semibold">Registrati</a>
      </p>

    </div>
  </div>
</div>
{% endblock %}
