services:
  - type: web
    name: fides
    env: python
    rootDir: fides
    buildCommand: pip install -r requirements.txt && FLASK_APP=run flask db upgrade
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fides-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: run
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: onboarding@resend.dev   # temporaneo — aggiorna con dominio custom
      - key: APP_URL
        sync: false                    # es. https://fides.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: cron
    name: fides-weekly-digest
    env: python
    rootDir: fides
    schedule: "0 7 * * 1"   # Ogni lunedì alle 07:00 UTC
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/blog_monitor_v2.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fides-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: onboarding@resend.dev   # temporaneo — aggiorna con dominio custom
      - key: APP_URL
        sync: false                    # es. https://fides.onrender.com

databases:
  - name: fides-db
    databaseName: fides
    plan: free
